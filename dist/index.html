<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="./css/styles.css">

</head>

<body class="min-h-screen w-screen bg-[#252F33] flex flex-col justify-between">

    <!-- Conteúdo Principal agrupado para controle do Flexbox -->
    <main class="grow flex flex-col justify-center gap-[4dvh] py-8">

        <!-- logo -->
        <div class="flex justify-center">
            <div class="items-center justify-center flex">
                <img src="./image/logo.png" alt="Logo da PouPix" class="max-h-[clamp(2rem,3rem+7vh,15rem)]" />
            </div>
        </div>

        <!-- botao criacao conta -->
        <div class="flex justify-center">
            <button title="Crie sua conta" type="button"
                class="text-nowrap text-[clamp(1rem,0.7rem+1.1vh,2.4rem)] text-white p-1 px-6 rounded-md font-semibold bg-cyan-500 border border-black cursor-pointer hover:text-cyan-500 hover:bg-[#252F33] hover:border-cyan-500 hover:scale-105 duration-500 ">
                Crie sua conta
            </button>
        </div>

        <!-- Formulário -->
        <form action="/login" method="post" class="flex flex-col justify-center items-center gap-2">
            <div>
                <div>
                    <label for="cpf" class="text-nowrap block text-base font-semibold text-amber-300 mb-1">
                        Digite seu CPF
                    </label>
                    <input type="text" inputmode="numeric" maxlength="14" type="text" id="cpf" name="cpf"
                        class="w-[clamp(11rem,10rem+10dvw,14rem)] rounded border border-amber-300/50 bg-gray-300 px-4 py-1 outline-none focus:border-cyan-400 placeholder:text-gray-800"
                        placeholder="123.456.789-10">
                </div>

                <div class="mt-2">
                    <label for="password" class="text-nowrap block text-base font-semibold text-amber-300 mb-1">
                        Digite sua senha
                    </label>
                    <input type="password" id="password" name="password"
                        class="w-[clamp(11rem,10rem+10dvw,14rem)] rounded border border-amber-300/50 bg-gray-300 px-4 py-1 outline-none focus:border-cyan-400 placeholder:text-gray-800"
                        placeholder="Senha">
                </div>
                <!-- Esqueci a senha -->
                <div class="flex justify-end">
                    <a href="#" class="cursor-pointer text-amber-300 text-xs text-right pt-1 underline">Esqueci a senha</a>
                </div>
            </div>
            <button type="submit"
                class="bg-amber-300 text-2xl text-black rounded mt-3 px-4 pb-1 align-middle cursor-pointer hover:scale-105 duration-500">
                Entrar
            </button>
        </form>

    </main>

    <!-- rodapé (sempre no fundo) -->
    <footer class="mt-auto w-full pb-6">
        <hr aria-hidden="true" class="mx-[13dvw] border-amber-300 border-t-2 mb-4 ">
        <div class="mx-[15dvw]">
            <ul class="w-full flex justify-between text-amber-300 text-[clamp(8px,5px+1dvw,15px)]">
                <li><a href="#">Termos de uso</a></li>
                <li><a href="#">Política de privacidade</a></li>
                <li><a href="#">Central de ajuda</a></li>
                <li><a href="#">Sobre a Poupix</a></li>
            </ul>
        </div>
    </footer>

</body>

</html>
